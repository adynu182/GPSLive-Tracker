<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Container untuk membuat peta responsive */
        .map-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            /* Rasio aspek 16:9 (tinggi / lebar * 100) */
            padding-top: 133%; 
        }

        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <!-- Wrapper Peta -->
    <div class="map-container">
        <!-- Tempel kode iframe dari Google Maps di bawah ini -->
        <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1iYDQlDrj2TvwmtSVVMJapiV2EOmbSkg&ehbc=2E312F&noprof=1" allowfullscreen></iframe>
    </div>

</body>
</html>
